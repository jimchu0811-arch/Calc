<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>114年植物診療師考題練習</title>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; touch-action: manipulation; }
        #quiz-container { background: white; width: 100%; max-width: 450px; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .progress { color: #888; font-size: 15px; font-weight: bold; }
        .score-display { color: #3b82f6; font-size: 15px; font-weight: bold; }
        .question { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #2d3436; line-height: 1.5; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 16px; border: 2px solid #f0f0f0; border-radius: 12px; cursor: pointer; transition: 0.2s; background: #fff; font-size: 16px; line-height: 1.4; color: #4b4b4b; }
        .option:active { background: #f9f9f9; transform: scale(0.98); }
        .correct { background: #d1fae5 !important; border-color: #10b981 !important; color: #065f46; font-weight: bold; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .result-screen { text-align: center; display: none; padding: 30px 10px; }
        .result-title { font-size: 24px; color: #2d3436; margin-bottom: 10px; }
        .final-score { font-size: 48px; color: #3b82f6; font-weight: bold; margin: 20px 0; }
        button { margin-top: 20px; width: 100%; padding: 16px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        button:active { transform: translateY(2px); }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-content">
        <div class="header">
            <div class="progress">進度：<span id="q-idx">1</span> / 80</div>
            <div class="score-display">得分：<span id="current-score">0</span></div>
        </div>
        <div id="q-text" class="question">載入中...</div>
        <div id="opt-container" class="options"></div>
    </div>
    <div id="result-content" class="result-screen">
        <div class="result-title">測驗完成！</div>
        <p>你的最終成績是：</p>
        <div class="final-score" id="final-score">0</div>
        <button onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
    const quizData = [

        { q: "52. 系統性感染（systemic infection）特徵？", a: ["只限局部", "從感染點擴展整株", "不進入維管束", "僅斑點病徵"], c: 1 },

        { q: "56. 有關柑橘黃龍病敘述何者正確？", a: ["刺粉蝨傳播", "南美立枯病", "木質部導管中", "新葉呈似缺鋅狀"], c: 3 },
        { q: "57. 使用專一性核酸片段標識為探針診斷：", a: ["PCR", "南方墨點法", "北方墨點法", "西方墨點法"], c: 1 },
        { q: "58. 避免木瓜輪點病，網室塑膠網目數為？", a: ["8", "16", "32", "36"], c: 2 },

        { q: "62. 防治木瓜疫病效果最佳藥劑？", a: ["貝芬替", "達滅芬", "撲克拉錳", "依普同"], c: 1 },

        { q: "80. 番茄水浸狀病斑轉黑褐、白色黴狀物用藥？", a: ["氫氧化銅", "福賽絕", "曼普胺", "待克利"], c: 2 }
    ];

    let current = 0;
    let score = 0;

    function render() {
        const data = quizData[current];
        document.getElementById("q-idx").innerText = current + 1;
        document.getElementById("current-score").innerText = score.toFixed(2);
        document.getElementById("q-text").innerText = data.q;
        
        const container = document.getElementById("opt-container");
        container.innerHTML = "";
        
        data.a.forEach((txt, i) => {
            const btn = document.createElement("div");
            btn.className = "option";
            btn.innerText = `${String.fromCharCode(65 + i)}. ${txt}`;
            btn.onclick = () => {
                const opts = document.querySelectorAll(".option");
                opts.forEach(o => o.style.pointerEvents = "none");
                
                if(i === data.c) {
                    btn.classList.add("correct");
                    score += 1.25;
                    document.getElementById("current-score").innerText = score.toFixed(2);
                } else {
                    btn.classList.add("wrong");
                    opts[data.c].classList.add("correct");
                }
                
                setTimeout(() => {
                    current++;
                    if(current < quizData.length) {
                        render();
                    } else {
                        showResult();
                    }
                }, 1000); // 答完 1 秒後自動跳下一題
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById("game-content").style.display = "none";
        document.getElementById("result-content").style.display = "block";
        document.getElementById("final-score").innerText = score.toFixed(2) + " 分";
    }

    // 初始化第一題
    render();
</script>

</body>
</html>
